<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Respira y Sigue</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>

  <!--Boton para subir al vagon-->
  <a id="enlace-final" href="nueva pag/index.html">
    <img src="imagenes/icono.png" alt="Ícono">
</a>

  <!-- Pantalla de introducción con video -->
  <div class="intro-screen">
    <video id="intro-video" autoplay muted playsinline>
      <source src="assets/video/Respira y sigue.mp4" type="video/mp4">
      Tu navegador no soporta videos.
    </video>
  </div>

  <!-- Andèn -->
  <div class="scrolling-row">
    <div class="scrollable">
      <img src="assets/imagenes/1.png" class="scrolling-image">
      <img src="assets/imagenes/2.png" class="scrolling-image">
      <img src="assets/imagenes/3.png" class="scrolling-image">
      <img src="assets/imagenes/4.png" class="scrolling-image">
    </div>
  </div>

  <!--Sonido del vago llegando-->
  <audio autoplay loop>
    <source src="\audio\llegada.mp3" type="audio/mpeg">
</audio>

  <script src="script.js"></script>
</body>
</html>
